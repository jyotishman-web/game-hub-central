<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a23; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
canvas { border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game" width="320" height="480"></canvas>
<script>
const c = document.getElementById('game'), ctx = c.getContext('2d');
let bird, pipes, score, frame, gameOver, started;

function reset() {
  bird = {x:80, y:200, vy:0, r:14}; pipes = []; score = 0; frame = 0; gameOver = false; started = false;
}

function addPipe() {
  const gap = 120, topH = 60 + Math.random() * (c.height - 200);
  pipes.push({x: c.width, top: topH, bot: topH + gap, scored: false});
}

function update() {
  if (!started || gameOver) { draw(); requestAnimationFrame(update); return; }
  bird.vy += 0.4; bird.y += bird.vy;
  frame++;
  if (frame % 90 === 0) addPipe();
  pipes.forEach(p => { p.x -= 2.5; if (!p.scored && p.x + 40 < bird.x) { p.scored = true; score++; } });
  pipes = pipes.filter(p => p.x > -50);
  // collision
  if (bird.y - bird.r < 0 || bird.y + bird.r > c.height) gameOver = true;
  pipes.forEach(p => { if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 40) { if (bird.y - bird.r < p.top || bird.y + bird.r > p.bot) gameOver = true; } });
  draw();
  requestAnimationFrame(update);
}

function draw() {
  // sky gradient
  const grad = ctx.createLinearGradient(0,0,0,c.height);
  grad.addColorStop(0,'#1a1a4e'); grad.addColorStop(1,'#0a0a23');
  ctx.fillStyle = grad; ctx.fillRect(0,0,c.width,c.height);
  // pipes
  pipes.forEach(p => {
    ctx.fillStyle = '#00b4d8';
    ctx.fillRect(p.x, 0, 40, p.top); ctx.fillRect(p.x, p.bot, 40, c.height - p.bot);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(p.x-2, p.top-16, 44, 16); ctx.fillRect(p.x-2, p.bot, 44, 16);
  });
  // bird
  ctx.fillStyle = '#f7d354'; ctx.beginPath(); ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e94560'; ctx.beginPath(); ctx.arc(bird.x+6, bird.y-3, 4, 0, Math.PI*2); ctx.fill();
  // score
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(score, c.width/2, 40);
  if (!started) { ctx.fillStyle = '#fff'; ctx.font = '18px sans-serif'; ctx.fillText('Tap or Space to start', c.width/2, c.height/2+50); }
  if (gameOver) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,c.width,c.height); ctx.fillStyle='#e94560'; ctx.font='bold 30px sans-serif'; ctx.fillText('Game Over',c.width/2,c.height/2-20); ctx.fillStyle='#fff'; ctx.font='18px sans-serif'; ctx.fillText('Score: '+score,c.width/2,c.height/2+15); ctx.fillText('Tap to restart',c.width/2,c.height/2+45); }
}

function flap() { if (gameOver) { reset(); started = true; addPipe(); return; } if (!started) { started = true; addPipe(); } bird.vy = -6.5; }

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
c.addEventListener('click', flap);
c.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

reset(); update();
</script>
</body>
</html>
