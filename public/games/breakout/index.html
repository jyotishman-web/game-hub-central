<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a23; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #fff; }
canvas { border: 2px solid #1a1a4e; border-radius: 8px; background: #141432; touch-action: none; }
.score { font-size: 20px; margin-bottom: 10px; color: #f7d354; }
</style>
</head>
<body>
<div class="score">Score: <span id="score">0</span> | Lives: <span id="lives">3</span></div>
<canvas id="game" width="480" height="400"></canvas>
<script>
const c = document.getElementById('game'), ctx = c.getContext('2d');
const W = c.width, H = c.height;
let paddleW = 75, paddleH = 10, paddleX = (W - paddleW) / 2;
let ballR = 6, bx, by, bdx, bdy;
let score = 0, lives = 3;
const brickR = 5, brickC = 8, brickW = 50, brickH = 16, brickP = 6, brickOffT = 40, brickOffL = (W - (brickC * (brickW + brickP) - brickP)) / 2;
let bricks = [];
const colors = ['#e94560','#f7d354','#00b4d8','#0ff','#7b2ff7','#ff6b6b','#51cf66','#ffa94d'];

function initBricks() {
  bricks = [];
  for (let r = 0; r < brickR; r++) { bricks[r] = [];
    for (let col = 0; col < brickC; col++) bricks[r][col] = { x: brickOffL + col * (brickW + brickP), y: brickOffT + r * (brickH + brickP), alive: true };
  }
}

function resetBall() { bx = W/2; by = H - 40; bdx = 3; bdy = -3; }

function draw() {
  ctx.clearRect(0, 0, W, H);
  // bricks
  for (let r = 0; r < brickR; r++) for (let col = 0; col < brickC; col++) {
    if (!bricks[r][col].alive) continue;
    ctx.fillStyle = colors[r % colors.length];
    ctx.beginPath(); ctx.roundRect(bricks[r][col].x, bricks[r][col].y, brickW, brickH, 3); ctx.fill();
  }
  // paddle
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(paddleX, H - 20, paddleW, paddleH, 4); ctx.fill();
  // ball
  ctx.fillStyle = '#0ff';
  ctx.beginPath(); ctx.arc(bx, by, ballR, 0, Math.PI * 2); ctx.fill();
}

function update() {
  bx += bdx; by += bdy;
  if (bx - ballR < 0 || bx + ballR > W) bdx = -bdx;
  if (by - ballR < 0) bdy = -bdy;
  if (by + ballR > H) { lives--; document.getElementById('lives').textContent = lives; if (lives <= 0) { alert('Game Over! Score: ' + score); score = 0; lives = 3; document.getElementById('score').textContent = score; document.getElementById('lives').textContent = lives; initBricks(); } resetBall(); }
  // paddle
  if (by + ballR >= H - 20 && bx > paddleX && bx < paddleX + paddleW) { bdy = -Math.abs(bdy); bdx += (bx - (paddleX + paddleW/2)) * 0.1; }
  // bricks
  for (let r = 0; r < brickR; r++) for (let col = 0; col < brickC; col++) {
    const b = bricks[r][col]; if (!b.alive) continue;
    if (bx > b.x && bx < b.x + brickW && by - ballR < b.y + brickH && by + ballR > b.y) { bdy = -bdy; b.alive = false; score++; document.getElementById('score').textContent = score; }
  }
  draw();
  requestAnimationFrame(update);
}

document.addEventListener('mousemove', e => { const rect = c.getBoundingClientRect(); paddleX = Math.min(Math.max(0, e.clientX - rect.left - paddleW/2), W - paddleW); });
document.addEventListener('touchmove', e => { e.preventDefault(); const rect = c.getBoundingClientRect(); paddleX = Math.min(Math.max(0, e.touches[0].clientX - rect.left - paddleW/2), W - paddleW); }, {passive: false});

initBricks(); resetBall(); update();
</script>
</body>
</html>
