<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guesser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .game-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        input {
            padding: 10px;
            font-size: 1rem;
            width: 100px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 1rem;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .message {
            margin: 1rem 0;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .attempts {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔢 Number Guesser</h1>
        <p>Guess a number between 1-100</p>
        
        <input type="number" id="guessInput" min="1" max="100" placeholder="Enter guess">
        
        <div>
            <button onclick="checkGuess()">Guess</button>
            <button onclick="newGame()">New Game</button>
        </div>
        
        <div class="message" id="message"></div>
        <div class="attempts" id="attempts">Attempts: 0</div>
    </div>

    <script>
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        
        function checkGuess() {
            const guess = parseInt(document.getElementById('guessInput').value);
            const messageEl = document.getElementById('message');
            const attemptsEl = document.getElementById('attempts');
            
            if (isNaN(guess) || guess < 1 || guess > 100) {
                messageEl.textContent = 'Please enter a valid number between 1-100';
                messageEl.style.color = 'red';
                return;
            }
            
            attempts++;
            attemptsEl.textContent = `Attempts: ${attempts}`;
            
            if (guess === secretNumber) {
                messageEl.textContent = `🎉 Correct! You got it in ${attempts} attempts!`;
                messageEl.style.color = 'green';
            } else if (guess < secretNumber) {
                messageEl.textContent = '📈 Too low! Try again.';
                messageEl.style.color = 'orange';
            } else {
                messageEl.textContent = '📉 Too high! Try again.';
                messageEl.style.color = 'orange';
            }
            
            document.getElementById('guessInput').value = '';
        }
        
        function newGame() {
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            document.getElementById('message').textContent = '';
            document.getElementById('attempts').textContent = 'Attempts: 0';
            document.getElementById('guessInput').value = '';
        }
    </script>
    <script src="https://pl28825633.effectivegatecpm.com/3a/00/61/3a00617a8f28194c222bd4ed804c1df7.js"></script>
</body>
</html>
