<!doctype html>
<html lang="en">
  <head>
    <title>HexGL</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="css/multi.css" type="text/css">
    <link rel="stylesheet" href="css/fonts.css" type="text/css">
    <style>
      body { padding:0; margin:0; background:#000; }
      canvas { pointer-events:none; width:100%; }
      #overlay { position:absolute; z-index:9999; top:0; left:0; width:100%; }
      #step-1, #step-2, #credits { display:none !important; }
      #step-3 { display:block; }
      #loading-msg {
        position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
        color:#fff; font-family:BebasNeueRegular,sans-serif; font-size:24px; z-index:100;
        flex-direction:column; gap:12px;
      }
      #loading-msg .bar { width:200px; height:4px; background:#333; border-radius:2px; overflow:hidden; }
      #loading-msg .bar div { height:100%; background:#458ab1; width:0%; transition:width 0.2s; }
    </style>
  </head>
  <body>
    <div id="loading-msg">
      <span>Loading HexGL...</span>
      <div class="bar"><div id="load-progress"></div></div>
    </div>
    <div id="step-1" style="display:none">
      <div id="global"></div><div id="title"></div>
      <div id="menucontainer"><div id="menu">
        <div id="start"></div>
        <div id="s-controlType"></div>
        <div id="s-quality"></div>
        <div id="s-hud"></div>
        <div id="s-godmode"></div>
        <div id="s-credits"></div>
      </div></div>
    </div>
    <div id="step-2" style="display:none"></div>
    <div id="step-3" style="display:none"><div id="progressbar"></div></div>
    <div id="step-4" style="display:none">
      <div id="overlay"></div>
      <div id="main"></div>
    </div>
    <div id="step-5" style="display:none">
      <div id="time"></div>
    </div>
    <div id="credits" style="display:none"></div>
    <div id="leapinfo" style="display:none"></div>

    <script src="libs/leap-0.4.1.min.js"></script>
    <script src="libs/Three.dev.js"></script>
    <script src="libs/ShaderExtras.js"></script>
    <script src="libs/postprocessing/EffectComposer.js"></script>
    <script src="libs/postprocessing/RenderPass.js"></script>
    <script src="libs/postprocessing/BloomPass.js"></script>
    <script src="libs/postprocessing/ShaderPass.js"></script>
    <script src="libs/postprocessing/MaskPass.js"></script>
    <script src="libs/Detector.js"></script>
    <script src="libs/Stats.js"></script>
    <script src="libs/DAT.GUI.min.js"></script>

    <script src="bkcore.coffee/controllers/TouchController.js"></script>
    <script src="bkcore.coffee/controllers/OrientationController.js"></script>
    <script src="bkcore.coffee/controllers/GamepadController.js"></script>
    <script src="bkcore.coffee/Timer.js"></script>
    <script src="bkcore.coffee/ImageData.js"></script>
    <script src="bkcore.coffee/Utils.js"></script>

    <script src="bkcore/threejs/RenderManager.js"></script>
    <script src="bkcore/threejs/Shaders.js"></script>
    <script src="bkcore/threejs/Particles.js"></script>
    <script src="bkcore/threejs/Loader.js"></script>
    <script src="bkcore/Audio.js"></script>

    <script src="bkcore/hexgl/HUD.js"></script>
    <script src="bkcore/hexgl/RaceData.js"></script>
    <script src="bkcore/hexgl/ShipControls.js"></script>
    <script src="bkcore/hexgl/ShipEffects.js"></script>
    <script src="bkcore/hexgl/CameraChase.js"></script>
    <script src="bkcore/hexgl/Gameplay.js"></script>
    <script src="bkcore/hexgl/tracks/Cityscape.js"></script>
    <script src="bkcore/hexgl/HexGL.js"></script>

    <script>
      // Auto-start: skip menu, load and play immediately
      (function() {
        var $ = function(id) { return document.getElementById(id); };
        var progressEl = $('load-progress');
        var loadingMsg = $('loading-msg');

        var isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        var controlType = isTouchDevice ? 1 : 0;
        var quality = 3;
        var hud = 1;
        var godmode = 0;

        var hexGL = new bkcore.hexgl.HexGL({
          document: document,
          width: window.innerWidth,
          height: window.innerHeight,
          container: $('main'),
          overlay: $('overlay'),
          gameover: $('step-5'),
          quality: quality,
          difficulty: 0,
          hud: hud === 1,
          controlType: controlType,
          godmode: godmode,
          track: 'Cityscape'
        });
        window.hexGL = hexGL;

        hexGL.load({
          onLoad: function() {
            hexGL.init();
            if (loadingMsg) loadingMsg.style.display = 'none';
            $('step-3').style.display = 'none';
            $('step-4').style.display = 'block';
            hexGL.start();
          },
          onError: function(s) {
            console.error('Error loading ' + s);
            if (loadingMsg) loadingMsg.querySelector('span').textContent = 'Error loading game assets';
          },
          onProgress: function(p, t, n) {
            var pct = (p.loaded / p.total * 100);
            if (progressEl) progressEl.style.width = pct + '%';
          }
        });

        // Restart on game over click
        $('step-5').onclick = function() { window.location.reload(); };
      })();
    </script>
  </body>
</html>
