<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #fff; }
canvas { border: 2px solid #0f3460; border-radius: 8px; background: #16213e; }
.score { font-size: 24px; margin-bottom: 12px; color: #e94560; }
.info { font-size: 14px; margin-top: 10px; color: #888; }
.game-over { display: none; position: absolute; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 12px; text-align: center; }
.game-over h2 { color: #e94560; margin-bottom: 10px; }
.game-over button { padding: 10px 24px; border: none; border-radius: 6px; background: #e94560; color: #fff; font-size: 16px; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>
<div class="score">Score: <span id="score">0</span></div>
<canvas id="game" width="400" height="400"></canvas>
<div class="info">Arrow keys or swipe to move</div>
<div class="game-over" id="gameOver">
  <h2>Game Over!</h2>
  <p>Score: <span id="finalScore">0</span></p>
  <button onclick="startGame()">Play Again</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const size = 20, cols = canvas.width / size, rows = canvas.height / size;
let snake, dir, food, score, running, interval;

function startGame() {
  document.getElementById('gameOver').style.display = 'none';
  snake = [{x:10,y:10}]; dir = {x:1,y:0}; score = 0;
  document.getElementById('score').textContent = score;
  placeFood(); running = true;
  if (interval) clearInterval(interval);
  interval = setInterval(update, 100);
}

function placeFood() {
  do { food = {x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows)}; }
  while (snake.some(s => s.x === food.x && s.y === food.y));
}

function update() {
  if (!running) return;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows || snake.some(s => s.x === head.x && s.y === head.y)) {
    running = false; clearInterval(interval);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOver').style.display = 'block'; return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) { score++; document.getElementById('score').textContent = score; placeFood(); }
  else snake.pop();
  draw();
}

function draw() {
  ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  snake.forEach((s, i) => { ctx.fillStyle = i === 0 ? '#0ff' : '#00b4d8'; ctx.fillRect(s.x*size+1, s.y*size+1, size-2, size-2); });
  ctx.fillStyle = '#e94560'; ctx.beginPath(); ctx.arc(food.x*size+size/2, food.y*size+size/2, size/2-2, 0, Math.PI*2); ctx.fill();
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if (map[e.key] && !(dir.x === -map[e.key].x && dir.y === -map[e.key].y)) dir = map[e.key];
});

let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY}; });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x, dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) { if (dir.y !== 0 || dir.x === 0) dir = dx > 0 ? {x:1,y:0} : {x:-1,y:0}; }
  else { if (dir.x !== 0 || dir.y === 0) dir = dy > 0 ? {x:0,y:1} : {x:0,y:-1}; }
});

startGame();
</script>
</body>
</html>
