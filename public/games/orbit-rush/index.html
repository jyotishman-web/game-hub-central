<script>
// --- CONFIGURATION ---
const CONFIG = {
    baseRotationSpeed: 0.035, 
    baseLaunchSpeed: 12, 
    basePlanetSize: 55, // Started slightly larger
    
    // DIFFICULTY SCALING
    difficultyStep: 5, // Every 5 points, things get harder
    
    colors: {
        bg: '#080808',
        player: '#FFFFFF',
        
        // Themes
        theme0: '#00E5FF', // Cyan (0-9)
        theme1: '#E040FB', // Purple (10-19)
        theme2: '#76FF03', // Lime (20-29)
        theme3: '#FF3D00'  // Orange/Red (30+)
    }
};

// --- MUSIC ENGINE ---
const MusicEngine = {
    ctx: null,
    isPlaying: false,
    nextNoteTime: 0,
    noteIndex: 0,
    tempo: 100,
    melody: [261.63, 329.63, 392.00, 493.88, 523.25, 392.00, 329.63, 261.63],

    init() {
        if (this.ctx) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
    },

    start() {
        if (!this.ctx) this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        if (this.isPlaying) return;
        
        this.isPlaying = true;
        this.nextNoteTime = this.ctx.currentTime;
        this.scheduler();
        this.playDrone();
    },

    playDrone() {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.value = 65.41; 
        osc.type = 'triangle';
        gain.gain.value = 0.05; 
        
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 200;

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
    },

    scheduler() {
        if (!this.isPlaying) return;
        while (this.nextNoteTime < this.ctx.currentTime + 0.1) {
            this.playNote(this.nextNoteTime);
            const secondsPerBeat = 60.0 / this.tempo;
            this.nextNoteTime += secondsPerBeat;
        }
        setTimeout(() => this.scheduler(), 25);
    },

    playNote(time) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const freq = this.melody[this.noteIndex % this.melody.length];
        osc.frequency.value = freq * ((Math.random() > 0.9) ? 0.5 : 1); 
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.1, time + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 1.5); 
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(time);
        osc.stop(time + 1.5);
        this.noteIndex++;
    }
};

const SFX = {
    playJump() {
        if(!MusicEngine.ctx) return;
        const ctx = MusicEngine.ctx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.setValueAtTime(400, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    },
    playCrash() {
        if(!MusicEngine.ctx) return;
        const ctx = MusicEngine.ctx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    }
};

// --- GAME CLASSES ---

class Player {
    constructor(startPlanet) {
        this.reset(startPlanet);
        this.trail = [];
    }

    reset(planet) {
        this.x = 0;
        this.y = 0;
        this.r = 8;
        this.angle = -Math.PI / 2;
        this.planet = planet;
        this.lastPlanet = planet; 
        this.vx = 0;
        this.vy = 0;
        this.speed = CONFIG.baseRotationSpeed;
        this.dead = false;
    }

    update() {
        if (this.dead) return;

        // Trail
        if (state.frame % 2 === 0) {
            this.trail.push({x: this.x, y: this.y, age: 10});
            if (this.trail.length > 15) this.trail.shift();
        }
        this.trail.forEach(t => t.age -= 0.5);

        if (this.planet) {
            // Orbiting
            this.angle += this.speed;
            this.x = this.planet.x + Math.cos(this.angle) * this.planet.r;
            this.y = this.planet.y + Math.sin(this.angle) * this.planet.r;
        } else {
            // Flying
            this.x += this.vx;
            this.y += this.vy;

            // Instant Death Checks
            if (this.x < -20 || this.x > state.width + 20) {
                die();
                return;
            }
            if (this.lastPlanet) {
                const dist = Math.hypot(this.x - this.lastPlanet.x, this.y - this.lastPlanet.y);
                if (dist > state.height * 0.7) { // 70% screen height leash
                    die();
                    return;
                }
            }

            // Collision
            state.planets.forEach(p => {
                if (p === this.lastPlanet || p.visited) return;
                const dx = this.x - p.x;
                const dy = this.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < p.r + this.r + 5) {
                    this.land(p, dx, dy);
                }
            });
        }
    }

    launch() {
        if (!this.planet || this.dead) return;
        SFX.playJump();
        
        // Launch speed increases with difficulty
        const difficultyLevel = Math.floor(state.score / CONFIG.difficultyStep);
        const speed = CONFIG.baseLaunchSpeed + (difficultyLevel * 0.8); 
        
        this.vx = Math.cos(this.angle + Math.PI/2) * speed;
        this.vy = Math.sin(this.angle + Math.PI/2) * speed;
        
        this.lastPlanet = this.planet; 
        this.planet = null;
    }

    land(planet, dx, dy) {
        this.planet = planet;
        this.angle = Math.atan2(dy, dx);
        planet.visited = true;
        
        createExplosion(this.x, this.y, getThemeColor(), 8);
        state.score++;
        
        // Update Difficulty on Land
        const difficultyLevel = Math.floor(state.score / CONFIG.difficultyStep);
        
        // Speed Up Rotation every 5 points
        this.speed = CONFIG.baseRotationSpeed + (difficultyLevel * 0.005); 

        // Visual Feedback
        let txt = "+1";
        if (state.score > 0 && state.score % CONFIG.difficultyStep === 0) {
            txt = "FASTER!";
            // Flash overlay slightly to indicate level up
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = 0.2;
            setTimeout(() => flash.style.opacity = 0, 200);
        }
        
        state.texts.push(new FloatingText(this.x, this.y - 30, txt));
        spawnPlanet();
    }

    draw(ctx) {
        if (this.dead) return;
        
        const theme = getThemeColor();

        if (this.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.lineWidth = 3;
            ctx.strokeStyle = theme;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        ctx.fillStyle = "#FFF";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fill();
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = theme;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class FloatingText {
    constructor(x, y, text) {
        this.x = x; this.y = y; this.text = text;
        this.life = 1.0;
        this.vy = -0.5;
    }
    update() {
        this.y += this.vy;
        this.life -= 0.02;
    }
    draw(ctx) {
        if(this.life <= 0) return;
        ctx.font = "900 16px Montserrat";
        ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
        ctx.textAlign = "center";
        ctx.fillText(this.text, this.x, this.y);
    }
}

class Planet {
    constructor(y, isStart) {
        const padding = 70;
        this.x = padding + Math.random() * (state.width - padding*2);
        this.y = y;
        
        // Difficulty: Smaller planets every 5 levels
        const difficultyLevel = Math.floor(state.score / CONFIG.difficultyStep);
        const sizeReduction = Math.min(25, difficultyLevel * 4); // Cap reduction at 25px
        
        this.rStart = Math.max(25, CONFIG.basePlanetSize - sizeReduction) + (Math.random() * 10);
        this.r = this.rStart;
        
        this.color = '#111';
        this.rim = '#333'; // Default rim, will be colored in draw
        
        this.decayDelay = 120; 
        this.decayRate = 0.1 + (difficultyLevel * 0.05); // Faster shrink every level
        this.isStart = isStart;
        this.visited = isStart;
    }

    update() {
        if (this.isStart) return;
        
        // Shrink starts after score 5
        if (state.score >= 5 && state.player.planet === this && !state.player.dead) {
            if (this.decayDelay > 0) {
                this.decayDelay--;
            } else {
                this.r -= this.decayRate;
                if (this.r <= state.player.r) die();
            }
        }
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0, this.r), 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        ctx.lineWidth = 3;
        
        // Dynamic color based on current score
        const activeColor = getThemeColor();
        
        // Rim Logic:
        // Visited planets stay grey/dim
        // Active planet gets theme color
        // Next planet gets dimmed theme color
        if (state.player.planet === this && !state.player.dead) {
            ctx.strokeStyle = activeColor;
            
            // Visual warning if shrinking
            if (this.r < this.rStart * 0.4) {
                 ctx.strokeStyle = '#FF0000'; // Critical danger
            }
        } else if (!this.visited) {
            ctx.strokeStyle = '#333';
        } else {
             ctx.strokeStyle = '#222';
        }
        
        ctx.stroke();
    }
}

// --- HELPERS ---

function getThemeColor() {
    if (state.score < 10) return CONFIG.colors.theme0; // Cyan
    if (state.score < 20) return CONFIG.colors.theme1; // Purple
    if (state.score < 30) return CONFIG.colors.theme2; // Lime
    return CONFIG.colors.theme3; // Orange/Red
}

// --- STATE MANAGEMENT ---

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

let state = {
    mode: 'MENU',
    width: 0, height: 0,
    score: 0,
    highScore: parseInt(localStorage.getItem('orbit_evolve_high')) || 0,
    camera: { y: 0 },
    player: null,
    planets: [],
    particles: [],
    texts: [],
    frame: 0
};

function init() {
    window.addEventListener('resize', resize);
    resize();
    
    const inputAction = (e) => {
        if (state.mode === 'PLAY') {
            e.preventDefault();
            state.player.launch();
        }
    };
    document.addEventListener('touchstart', inputAction, {passive: false});
    document.addEventListener('mousedown', inputAction);
    document.addEventListener('keydown', e => { if(e.code === 'Space') inputAction(e); });

    document.getElementById('start-btn').onclick = (e) => { e.stopPropagation(); startGame(); };
    document.getElementById('restart-btn').onclick = (e) => { e.stopPropagation(); startGame(); };

    loop();
}

function resize() {
    state.width = window.innerWidth;
    state.height = window.innerHeight;
    canvas.width = state.width;
    canvas.height = state.height;
}

function startGame() {
    MusicEngine.start(); 
    
    document.getElementById('menu-panel').classList.remove('visible');
    document.getElementById('menu-panel').classList.add('hidden');
    document.getElementById('gameover-panel').classList.remove('visible');
    document.getElementById('gameover-panel').classList.add('hidden');
    
    state.score = 0;
    state.mode = 'PLAY';
    state.planets = [];
    state.particles = [];
    state.texts = [];
    state.frame = 0;
    
    // Reset Color
    document.getElementById('hud-score').style.color = CONFIG.colors.theme0;
    
    const startP = new Planet(state.height - 200, true);
    startP.x = state.width/2;
    state.planets.push(startP);
    spawnPlanet();
    
    state.player = new Player(startP);
    state.camera.y = startP.y - state.height/1.5;

    document.getElementById('hud-score').innerText = "0";
}

function spawnPlanet() {
    const lastP = state.planets[state.planets.length-1];
    
    // Difficulty: Increase distance slightly every 5 levels
    const difficultyLevel = Math.floor(state.score / CONFIG.difficultyStep);
    const addedDistance = Math.min(100, difficultyLevel * 10);
    
    const dist = 220 + addedDistance + Math.random() * 80; 
    const nextY = lastP.y - dist;
    
    state.planets.push(new Planet(nextY, false));
    if (state.planets.length > 5) state.planets.shift();
}

function createExplosion(x, y, color, count) {
    for(let i=0; i<count; i++) {
        state.particles.push({
            x: x, y: y, color: color,
            vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7,
            life: 1.0
        });
    }
}

function die() {
    if (state.mode !== 'PLAY') return;
    state.mode = 'DYING'; 
    SFX.playCrash();
    
    state.player.dead = true;
    createExplosion(state.player.x, state.player.y, '#FFF', 20);

    const newRecord = state.score > state.highScore;
    if (newRecord) {
        state.highScore = state.score;
        localStorage.setItem('orbit_evolve_high', state.highScore);
    }

    setTimeout(() => showGameOver(newRecord), 1000);
}

function showGameOver(newRecord) {
    state.mode = 'OVER';
    
    const panel = document.getElementById('gameover-panel');
    const title = document.getElementById('go-title');
    
    title.innerText = newRecord ? "New Best!" : "Game Over";
    title.style.color = newRecord ? "#FFD700" : "#FFF";

    document.getElementById('final-score').innerText = state.score;
    document.getElementById('best-score').innerText = state.highScore;
    
    panel.classList.remove('hidden');
    void panel.offsetWidth; 
    panel.classList.add('visible');
}

// --- RENDER LOOP ---

function update() {
    state.frame++;
    
    if (state.player && !state.player.dead) {
        const targetY = state.player.y - state.height/1.6;
        state.camera.y += (targetY - state.camera.y) * 0.08;
    }

    state.player?.update();
    state.planets.forEach(p => p.update());
    
    state.particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        if(p.life <= 0) state.particles.splice(i, 1);
    });
    
    state.texts.forEach((t, i) => {
        t.update();
        if(t.life <= 0) state.texts.splice(i, 1);
    });

    const hud = document.getElementById('hud-score');
    hud.innerText = state.score;
    // Update HUD Color based on Theme
    hud.style.color = getThemeColor();
}

function draw() {
    ctx.fillStyle = CONFIG.colors.bg;
    ctx.fillRect(0, 0, state.width, state.height);
    
    ctx.save();
    ctx.translate(0, -state.camera.y);

    state.planets.forEach(p => p.draw(ctx));
    state.player?.draw(ctx);
    
    state.particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
        ctx.fill();
    });

    state.texts.forEach(t => t.draw(ctx));

    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

init();

</script>
